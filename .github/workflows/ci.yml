name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify lint requirements
        run: |
          node -e "
          const fs = require('fs');
          const lock = JSON.parse(fs.readFileSync('package-lock.json', 'utf8'));
          const reqs = fs.readFileSync('lint_requirements.txt', 'utf8').trim().split('\n');
          let failed = false;
          for (const req of reqs) {
            const [name, version] = req.split('==');
            const installed = lock.packages['node_modules/' + name]?.version;
            if (installed !== version) {
              console.error('Mismatch: ' + name + ' expected ' + version + ' but got ' + installed);
              failed = true;
            }
          }
          if (failed) process.exit(1);
          console.log('All lint requirements match installed versions.');
          "

      - name: Run npm security audit
        run: npm audit --audit-level=critical
        continue-on-error: true

      - name: Run TypeScript build check
        run: npm run build

      - name: Run linter
        run: npm run lint

      - name: Check code formatting
        run: npm run format:check

      - name: Run tests
        run: npm test
